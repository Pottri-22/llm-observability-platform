services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: aegis
      CLICKHOUSE_USER: aegis
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-aegis_dev_pw}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/config.d/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql+asyncpg://aegis:${POSTGRES_PASSWORD:-aegis_dev_pw}@postgres:5432/aegis
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: aegis
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-aegis_dev_pw}
      CLICKHOUSE_DATABASE: aegis
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Async eval worker. Same image as api, different entrypoint — Celery picks up
  # eval_trace jobs from Redis and writes evaluations rows to ClickHouse. No port
  # binding (it's queue-driven, not an HTTP service).
  worker:
    build: ./backend
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: aegis
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-aegis_dev_pw}
      CLICKHOUSE_DATABASE: aegis
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      ENV: dev
      # Used by EVAL-B (LLM-as-Judge); read from the host .env at compose time
      # so the key never gets committed to git.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The api's Dockerfile HEALTHCHECK probes :8000, which the worker doesn't
    # serve — disable here so `docker compose ps` reflects worker liveness via
    # the container's running state, not a perma-failing HTTP probe.
    healthcheck:
      disable: true

volumes:
  postgres_data:
  clickhouse_data:
