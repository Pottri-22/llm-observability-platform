{{- if .Values.serviceAccount.create }}
# Week 0 · Block 7 — templated ServiceAccount.
# A dedicated identity for the workload instead of the namespace "default"
# SA. Minimal here (no RBAC bindings), but it's the hook the real Aegis
# chart hangs least-privilege Roles off (README section 10).
#
# The if-guard MUST lead this file. A left-chomping if-guard placed AFTER a
# comment block eats the comment's trailing newline and glues apiVersion
# onto the comment line, silently commenting it out. (Also: never write a
# literal template action inside a YAML comment here — Helm's lexer parses
# template syntax everywhere in the file, comments included.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hello-aegis.serviceAccountName" . }}
  labels:
    {{- include "hello-aegis.labels" . | nindent 4 }}
{{- end }}
